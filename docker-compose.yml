
services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ejoy
      POSTGRES_PASSWORD: ejoy123
      POSTGRES_DB: ejoy
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ejoy -d ejoy"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - postgres_data:/var/lib/postgresql/data

  prisma-init:
    image: node:22-alpine
    working_dir: /workspace
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Use docker network hostname `postgres` (NOT localhost)
      DATABASE_URL: postgresql://ejoy:ejoy123@postgres:5432/ejoy
      COREPACK_ENABLE_DOWNLOAD_PROMPT: "0"
    volumes:
      - ./:/workspace
    command:
      [
        "sh",
        "-lc",
        "corepack enable && corepack prepare pnpm@10.33.0 --activate && if [ ! -f apps/order-service/node_modules/prisma/build/index.js ]; then echo 'Dependencies are missing. Run corepack enable, corepack prepare pnpm@10.33.0 --activate, and pnpm install on the host before docker compose run --rm prisma-init.'; exit 1; fi && pnpm --filter order-service exec prisma db push && pnpm --filter order-service exec prisma generate && pnpm --filter order-service run db:seed",
      ]
  redis:
    image: redis:7.4-alpine
    ports:
      - "6379:6379"
  kafka:
    image: confluentinc/cp-kafka:7.7.1
    container_name: kafka
    hostname: kafka
    ports:
      - "9094:9094"
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_LISTENERS=PLAINTEXT://kafka:29092,PLAINTEXT_HOST://0.0.0.0:9094,CONTROLLER://kafka:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9094
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,CONTROLLER:PLAINTEXT
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_LOG_DIRS=/var/lib/kafka/data
      - CLUSTER_ID=MkU3OEVBNTcwNTJENDM2Qk
    volumes:
      - kafka_data:/var/lib/kafka/data
  meilisearch:
    image: getmeili/meilisearch:v1.11
    ports:
      - "7700:7700"
    environment:
      MEILI_MASTER_KEY: masterKey123
    volumes:
      - meilisearch_data:/meili_data
volumes:
  postgres_data:
  kafka_data:
  meilisearch_data:
